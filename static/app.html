<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Table Extractor - Convert PDF to Excel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container-custom {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            padding: 0.75rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-outline-custom {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-outline-custom:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #result {
            margin-top: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-layout {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
        }

        .btn-layout:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
            color: white;
        }

        .mode-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.75rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container-custom">
        <h1>PDF Table Extractor</h1>

        <div class="mb-3">
            <label for="pdfFile" class="form-label">Select PDF File</label>
            <input type="file" class="form-control" id="pdfFile" accept=".pdf">
        </div>

        <div class="mb-3">
            <label for="pdfPassword" class="form-label">Password (Optional)</label>
            <input type="password" class="form-control" id="pdfPassword"
                placeholder="Enter password if PDF is protected">
        </div>

        <div class="button-group">
            <button class="btn btn-custom" id="extractBtn" onclick="uploadFile()">
                📊 Extract to Excel
            </button>
        </div>

        <p class="mode-hint">
            Works with invoices, bank statements and ledgers — digital or scanned.
            Tables that run across pages are merged into a single sheet.
        </p>


        <div class="loader" id="loader"></div>
        <div id="result"></div>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function uploadFile() {
            const file = document.getElementById("pdfFile").files[0];
            if (!file) {
                alert("Please select a PDF file first.");
                return;
            }

            const loader = document.getElementById("loader");
            const result = document.getElementById("result");
            const button = document.getElementById("extractBtn");
            result.innerHTML = "";
            loader.style.display = "block";
            button.disabled = true;
            result.innerHTML = `<span style="color:#667eea">Analyzing layout… scanned pages take longer.</span>`;

            const password = document.getElementById("pdfPassword").value || null;

            const form = new FormData();
            form.append("file", file);
            if (password) form.append("password", password);

            try {
                const response = await fetch(`${window.location.origin}/extract-xlsx`, {
                    method: "POST",
                    body: form
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    loader.style.display = "none";
                    button.disabled = false;
                    result.innerHTML = `<span style="color:red">❌ ${error.detail || "Error occurred"}</span>`;
                    return;
                }

                const blob = await response.blob();

                // Extract filename from Content-Disposition header
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = "extracted_tables.xlsx";
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename=(.+)/);
                    if (filenameMatch && filenameMatch[1]) {
                        filename = filenameMatch[1].replace(/['"]/g, '');
                    }
                }

                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();

                result.innerHTML = `<span style="color:#28a745">✅ Extraction successful! Download started.</span>`;
            } catch (err) {
                result.innerHTML = `<span style="color:red">❌ ${err.message}</span>`;
            }

            loader.style.display = "none";
            button.disabled = false;
        }
    </script>
</body>

</html>
